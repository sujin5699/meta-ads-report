name: Meta Ads 데이터 자동 동기화

on:
  schedule:
    # 매일 자정 KST (= UTC 15:00) 실행
    - cron: '0 15 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (GitHub Actions 탭에서 언제든 직접 실행 가능)
    inputs:
      date_from:
        description: '시작일 (YYYY-MM-DD, 비우면 어제)'
        required: false
      date_to:
        description: '종료일 (YYYY-MM-DD, 비우면 어제)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: Meta API 데이터 가져오기
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: python sync.py

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: auto sync $(date +'%Y-%m-%d %H:%M KST')"
          git push
